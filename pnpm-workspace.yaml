packages: []

# pnpm v11 по умолчанию ставит strictDepBuilds=true и роняет install
# (ERR_PNPM_IGNORED_BUILDS), если у зависимостей есть пропущенные build-скрипты.
# На pnpm 10 это был лишь warning и сборка проходила. Возвращаем прежнее
# поведение и заодно явно разрешаем нужные скрипты.
strictDepBuilds: false
onlyBuiltDependencies:
  - '@go-task/cli'
  - esbuild
